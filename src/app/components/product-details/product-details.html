<div class="page">
  <button class="back-btn" (click)="goBack()">← Back to Products</button>

  <div *ngIf="loading">
    <div class="skeleton-img" style="border-radius:20px; height:400px; margin-bottom:2rem;"></div>
  </div>

  <div class="details-grid" *ngIf="!loading && product">
    <div class="details-img-wrap">
      <img [src]="product.imageUrl || 'https://picsum.photos/seed/' + product.productId + '/600/600'"
           [alt]="product.name"
           (error)="product.imageUrl = 'https://picsum.photos/seed/' + product.productId + '/600/600'" />
    </div>

    <div class="details-content">
      <span class="details-tag">Product Details</span>
      <h1 class="details-name">{{ product.name }}</h1>
      <div class="details-price">₹{{ product.price }}</div>
      <p class="details-desc">{{ product.description }}</p>

      <div class="details-meta">
        <div class="meta-row">
          <span class="meta-label">Availability</span>
          <span class="meta-value" [style.color]="product.stock === 0 ? '#e53e3e' : '#059669'">
            {{ product.stock === 0 ? 'Out of Stock' : 'In Stock' }}
          </span>
        </div>

        <div class="meta-row">
          <span class="meta-label">Units Available</span>
          <span class="meta-value">{{ product.stock }}</span>
        </div>

        <div class="meta-row">
          <span class="meta-label">Product ID</span>
          <span class="meta-value">#{{ product.productId }}</span>
        </div>
      </div>

      <div class="qty-control" *ngIf="product.stock > 0">
        <span class="qty-label">Quantity</span>
        <div class="qty-btns">
          <button class="qty-btn" (click)="decrement()" [disabled]="quantity <= 1">−</button>
          <span class="qty-num">{{ quantity }}</span>
          <button class="qty-btn" (click)="increment()" [disabled]="quantity >= product.stock">+</button>
        </div>
      </div>

      <button class="btn-add-to-cart" (click)="addToCart()" [disabled]="product.stock === 0">
        🛒 {{ product.stock === 0 ? 'Out of Stock' : 'Add to Cart' }}
      </button>

      <div class="added-toast" *ngIf="added">
        ✓ {{ quantity }} item(s) added to cart!
      </div>
    </div>
  </div>
</div>
